<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, interactive-widget=resizes-content"
    />
    <title>茶掌柜</title>

    <!-- PWA Meta -->
    <meta name="theme-color" content="#0A0E1A" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="apple-mobile-web-app-title" content="茶掌柜" />
    <meta name="description" content="茶叶批发零售管理助手" />

    <!-- Icons -->
    <link
      rel="icon"
      type="image/png"
      sizes="192x192"
      href="./icons/icon-192.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="512x512"
      href="./icons/icon-512.png"
    />
    <link rel="apple-touch-icon" href="./icons/icon-192.png" />
  </head>
  <body>
    <div id="root"></div>
    <script>
      /*
       * 移动端语音输入默认关闭，开源仓库不再内置任何讯飞凭证。
       *
       * 如果你想启用语音输入：
       * 1. 到讯飞开放平台注册账号并开通“实时语音转写”
       * 2. 新账号通常有可用的免费额度，足够先本地试起来
       * 3. 拿到 APPID 和 APIKey 后，在部署环境里注入下面这段配置
       *
       * window.__SMARTSTOCK_MOBILE_CONFIG__ = {
       *   speech: {
       *     appId: '你的 APPID',
       *     apiKey: '你的 APIKey',
       *   },
       * }
       */
      window.__SMARTSTOCK_MOBILE_CONFIG__ = {
        speech: {
          appId: '246e37d6',
          apiKey: '753540a814ab14be218c0c147685acd6'
        }
      };
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
