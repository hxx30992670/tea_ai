<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1500px;
    height: 1500px;
    font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: #0a0f1a;
    color: #fff;
    overflow: hidden;
    position: relative;
  }

  /* 科技感背景 */
  body::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background:
      radial-gradient(ellipse at 50% 30%, rgba(0, 200, 120, 0.12) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 70%, rgba(0, 150, 255, 0.08) 0%, transparent 50%),
      radial-gradient(ellipse at 20% 80%, rgba(100, 200, 100, 0.06) 0%, transparent 40%);
    pointer-events: none;
  }

  /* 网格线背景 */
  body::after {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background-image:
      linear-gradient(rgba(0,200,120,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,200,120,0.03) 1px, transparent 1px);
    background-size: 60px 60px;
    pointer-events: none;
  }

  .container {
    width: 100%;
    height: 100%;
    padding: 80px 90px;
    display: flex;
    flex-direction: column;
    position: relative;
    z-index: 1;
  }

  /* 顶部：AI Agent 强调 */
  .ai-badge-row {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 50px;
  }
  .ai-badge {
    background: linear-gradient(135deg, #00c878, #00a060);
    padding: 10px 28px;
    border-radius: 8px;
    font-size: 26px;
    font-weight: 800;
    letter-spacing: 3px;
    color: #fff;
    box-shadow: 0 0 30px rgba(0,200,120,0.3);
  }
  .ai-badge-sub {
    font-size: 24px;
    color: rgba(255,255,255,0.4);
    letter-spacing: 1px;
  }

  /* Logo 区域 */
  .hero {
    display: flex;
    align-items: center;
    gap: 40px;
    margin-bottom: 20px;
  }
  .logo {
    width: 180px;
    height: 180px;
    border-radius: 36px;
    background: radial-gradient(circle at 50% 50%, rgba(0,200,120,0.15), transparent 70%);
    padding: 8px;
    box-shadow: 0 0 50px rgba(0,200,120,0.15);
  }
  .logo img {
    width: 100%;
    height: 100%;
    object-fit: contain;
  }
  .hero-text .name {
    font-size: 88px;
    font-weight: 900;
    letter-spacing: 6px;
    background: linear-gradient(135deg, #fff 30%, #80e8b6);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .hero-text .en-name {
    font-size: 28px;
    color: rgba(255,255,255,0.3);
    letter-spacing: 4px;
    margin-top: 4px;
  }

  /* 主标语 */
  .headline {
    font-size: 48px;
    font-weight: 800;
    line-height: 1.6;
    margin-bottom: 55px;
    color: rgba(255,255,255,0.88);
  }
  .headline em {
    font-style: normal;
    color: #5cf5a0;
    text-shadow: 0 0 20px rgba(92,245,160,0.3);
  }

  /* AI 能力卡片 - 核心区域 */
  .ai-section-title {
    font-size: 24px;
    color: rgba(255,255,255,0.35);
    letter-spacing: 6px;
    margin-bottom: 22px;
    text-transform: uppercase;
  }
  .ai-cards {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr 1fr;
    gap: 20px;
    margin-bottom: 50px;
  }
  .ai-card {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(0,200,120,0.15);
    border-radius: 20px;
    padding: 30px 24px;
    text-align: center;
    transition: all 0.3s;
  }
  .ai-card-icon {
    font-size: 48px;
    margin-bottom: 16px;
    display: block;
  }
  .ai-card-name {
    font-size: 28px;
    font-weight: 700;
    color: rgba(255,255,255,0.9);
    margin-bottom: 8px;
  }
  .ai-card-desc {
    font-size: 22px;
    color: rgba(255,255,255,0.4);
    line-height: 1.5;
  }

  /* 基础功能条 */
  .base-features {
    display: flex;
    flex-wrap: wrap;
    gap: 14px;
    margin-bottom: 50px;
  }
  .base-tag {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    padding: 12px 26px;
    border-radius: 12px;
    font-size: 24px;
    color: rgba(255,255,255,0.55);
  }

  /* 底部 */
  .bottom {
    margin-top: auto;
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
  }
  .bottom-left {}
  .bottom-slogan {
    font-size: 38px;
    font-weight: 800;
    color: #5cf5a0;
    margin-bottom: 10px;
    letter-spacing: 1px;
  }
  .bottom-desc {
    font-size: 24px;
    color: rgba(255,255,255,0.35);
  }
  .bottom-cta {
    background: linear-gradient(135deg, #5cf5a0, #00c878);
    color: #0a1a10;
    padding: 22px 48px;
    border-radius: 16px;
    font-size: 34px;
    font-weight: 800;
    letter-spacing: 3px;
    box-shadow: 0 8px 30px rgba(0,200,120,0.3);
  }

  /* 装饰光点 */
  .glow-1 {
    position: absolute;
    width: 300px;
    height: 300px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(0,200,120,0.08), transparent 70%);
    top: -50px;
    right: -50px;
    pointer-events: none;
  }
  .glow-2 {
    position: absolute;
    width: 400px;
    height: 400px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(0,150,255,0.05), transparent 70%);
    bottom: -100px;
    left: -100px;
    pointer-events: none;
  }
</style>
</head>
<body>
<div class="glow-1"></div>
<div class="glow-2"></div>

<div class="container">
  <div class="ai-badge-row">
    <span class="ai-badge">AI AGENT</span>
    <span class="ai-badge-sub">大模型驱动的智能茶叶管理系统</span>
  </div>

  <div class="hero">
    <div class="logo">
      <img src="../packages/shared/assets/logo_clean.png" alt="茶掌柜" />
    </div>
    <div class="hero-text">
      <div class="name">茶掌柜</div>
      <div class="en-name">SMARTSTOCK</div>
    </div>
  </div>

  <div class="headline">
    不只是进销存，更是你的 <em>AI 经营助手</em><br/>
    问一句话，数据、图表、建议全出来
  </div>

  <div class="ai-section-title">AI Agent 核心能力</div>
  <div class="ai-cards">
    <div class="ai-card">
      <span class="ai-card-icon">💬</span>
      <div class="ai-card-name">自然语言</div>
      <div class="ai-card-desc">用说话的方式<br/>查经营数据</div>
    </div>
    <div class="ai-card">
      <span class="ai-card-icon">📊</span>
      <div class="ai-card-name">智能图表</div>
      <div class="ai-card-desc">自动生成<br/>可视化报表</div>
    </div>
    <div class="ai-card">
      <span class="ai-card-icon">🧠</span>
      <div class="ai-card-name">经营建议</div>
      <div class="ai-card-desc">基于真实数据<br/>给落地方案</div>
    </div>
    <div class="ai-card">
      <span class="ai-card-icon">📸</span>
      <div class="ai-card-name">拍照录单</div>
      <div class="ai-card-desc">截图识别<br/>自动录入订单</div>
    </div>
  </div>

  <div class="base-features">
    <span class="base-tag">商品管理</span>
    <span class="base-tag">库存管理</span>
    <span class="base-tag">销售开单</span>
    <span class="base-tag">采购管理</span>
    <span class="base-tag">客户管理</span>
    <span class="base-tag">数据看板</span>
    <span class="base-tag">手机端 PWA</span>
    <span class="base-tag">Docker 部署</span>
  </div>

  <div class="bottom">
    <div class="bottom-left">
      <div class="bottom-slogan">源码交付 · 包部署 · 包售后</div>
      <div class="bottom-desc">Web + 移动端 + 后端 完整源码，开箱即用</div>
    </div>
    <div class="bottom-cta">立即咨询</div>
  </div>
</div>
</body>
</html>
